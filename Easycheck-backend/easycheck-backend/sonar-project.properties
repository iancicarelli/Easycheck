sonar.projectKey=easycheck-backend
sonar.projectName=easycheck-backend

# El directorio base es este mismo (easycheck-backend), de modo que las rutas
# del reporte lcov (SF:src/...) coinciden con lo que SonarQube indexa.
sonar.sources=src
sonar.tests=test

# Los specs unitarios viven dentro de src/, por eso se marcan también como tests.
sonar.test.inclusions=test/**/*,src/**/*.spec.ts
sonar.exclusions=src/**/*.spec.ts,**/node_modules/**,**/dist/**,**/coverage/**

# Reporte de cobertura COMBINADO (unit + integration + e2e + bdd + tdd),
# generado por `npm run test:cov` (jest.config.js con `projects`).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Excluidos de la métrica de cobertura (mismos globs que jest.config.js):
# seed y adapters TypeORM solo se ejercitan contra Postgres real (Docker),
# nunca en las suites de Jest, que corren 100 % in-memory.
sonar.coverage.exclusions=src/seed/**,src/database/entities/**,src/database/migrations/**,src/database/database.module.ts,src/database/data-source.ts,src/database/use-database.ts,src/**/*.typeorm.repository.ts,src/**/typeorm-*.ts,src/main.ts,src/**/*.module.ts

sonar.sourceEncoding=UTF-8
